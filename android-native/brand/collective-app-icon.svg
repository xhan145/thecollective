<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Collective app icon">
  <title>Collective final mark - wide C, three people, open book</title>
  <defs>
    
    <mask id="bookCutouts" maskUnits="userSpaceOnUse">
      <rect width="1024" height="1024" fill="white"/>
      <!-- transparent page folds and lower book separations -->
      <path d="M512 840 C444 730 344 666 230 642" fill="none" stroke="black" stroke-width="18" stroke-linecap="round"/>
      <path d="M512 840 C580 730 680 666 794 642" fill="none" stroke="black" stroke-width="18" stroke-linecap="round"/>
      <path d="M512 840 C430 690 329 621 226 622" fill="none" stroke="black" stroke-width="14" stroke-linecap="round"/>
      <path d="M512 840 C594 690 695 621 798 622" fill="none" stroke="black" stroke-width="14" stroke-linecap="round"/>
      <path d="M512 840 L512 721" fill="none" stroke="black" stroke-width="14" stroke-linecap="round"/>
    </mask>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="#FFF8EE"/>
  <g mask="url(#bookCutouts)" fill="#F2A900" stroke="none">
    <!-- wide open C underlay -->
    <path d="M762 220 A364 364 0 1 0 792 782" fill="none" stroke="#F2A900" stroke-width="88" stroke-linecap="butt"/>

    <!-- open book base -->
    <path d="M198 638 C322 640 436 724 512 858 C390 842 274 772 198 638 Z"/>
    <path d="M826 638 C702 640 588 724 512 858 C634 842 750 772 826 638 Z"/>
    <path d="M238 604 C350 618 438 680 512 828 C420 762 328 724 228 708 Z"/>
    <path d="M786 604 C674 618 586 680 512 828 C604 762 696 724 796 708 Z"/>

    <!-- three people / contributors -->
    <circle cx="512" cy="308" r="43"/>
    <path d="M465 421 Q465 380 506 380 L518 380 Q559 380 559 421 L559 660 Q559 680 544 696 L512 730 L480 696 Q465 680 465 660 Z"/>

    <circle cx="405" cy="374" r="39"/>
    <path d="M355 490 Q355 447 398 447 L412 447 Q455 447 455 490 L455 660 Q405 628 355 610 Z"/>

    <circle cx="619" cy="374" r="39"/>
    <path d="M569 490 Q569 447 612 447 L626 447 Q669 447 669 490 L669 610 Q619 628 569 660 Z"/>
  </g>
</svg>