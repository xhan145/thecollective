<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="member portrait">
  <defs>
    <radialGradient id="bg" cx="42%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#FFE2C0"/>
      <stop offset="100%" stop-color="#FFE2C0" stop-opacity="0.78"/>
    </radialGradient>
    <clipPath id="disc"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#disc)">
    <rect x="0" y="0" width="100" height="100" fill="url(#bg)"/>
    <circle cx="50" cy="50" r="50" fill="none" stroke="#F2A900" stroke-width="2.5" stroke-opacity="0.55"/>
    <!-- shoulders -->
    <path d="M16 100 Q16 76 50 76 Q84 76 84 100 Z" fill="#A24D5A"/>
    <path d="M42 78 Q50 86 58 78 L58 72 Q50 76 42 72 Z" fill="#A24D5A" opacity="0.85"/>
    <!-- neck -->
    <rect x="44" y="64" width="12" height="14" rx="5" fill="#CC9469"/>
    <!-- head -->
    <ellipse cx="50" cy="47" rx="21" ry="23" fill="#E0AC81"/>
    <circle cx="28" cy="49" r="4" fill="#E0AC81"/>
    <circle cx="72" cy="49" r="4" fill="#E0AC81"/>
    <!-- cheeks -->
    <ellipse cx="40" cy="54" rx="3.5" ry="2.4" fill="#E8896B" opacity="0.28"/>
    <ellipse cx="60" cy="54" rx="3.5" ry="2.4" fill="#E8896B" opacity="0.28"/>
    
    <!-- eyes -->
    <ellipse cx="42.5" cy="46" rx="2.3" ry="3" fill="#2A2018"/>
    <ellipse cx="57.5" cy="46" rx="2.3" ry="3" fill="#2A2018"/>
    <circle cx="43.3" cy="45" r="0.8" fill="#fff" opacity="0.85"/>
    <circle cx="58.3" cy="45" r="0.8" fill="#fff" opacity="0.85"/>
    <!-- brows -->
    <path d="M39 41 Q42.5 39 46 41" stroke="#1A1A1A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M54 41 Q57.5 39 61 41" stroke="#1A1A1A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M50 47 L48 53 Q50 55 52 53" stroke="#CC9469" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- mouth -->
    <path d="M44 58 Q50 63 56 58" stroke="#9A4A38" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- hair on top -->
    <circle cx="50" cy="19" r="8" fill="#1A1A1A"/>
        <path d="M28 46 C27 27 73 27 72 46 C72 35 68 31 50 31 C32 31 28 35 28 46 Z" fill="#1A1A1A"/>
  </g>
</svg>
