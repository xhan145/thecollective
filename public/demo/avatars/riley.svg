<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="member portrait">
  <defs>
    <radialGradient id="bg" cx="42%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#FFF1C7"/>
      <stop offset="100%" stop-color="#FFF1C7" stop-opacity="0.78"/>
    </radialGradient>
    <clipPath id="disc"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>
  <g clip-path="url(#disc)">
    <rect x="0" y="0" width="100" height="100" fill="url(#bg)"/>
    <circle cx="50" cy="50" r="50" fill="none" stroke="#F2A900" stroke-width="2.5" stroke-opacity="0.55"/>
    <!-- shoulders -->
    <path d="M16 100 Q16 76 50 76 Q84 76 84 100 Z" fill="#4A6670"/>
    <path d="M42 78 Q50 86 58 78 L58 72 Q50 76 42 72 Z" fill="#4A6670" opacity="0.85"/>
    <!-- neck -->
    <rect x="44" y="64" width="12" height="14" rx="5" fill="#E0B58C"/>
    <!-- head -->
    <ellipse cx="50" cy="47" rx="21" ry="23" fill="#F1C9A5"/>
    <circle cx="28" cy="49" r="4" fill="#F1C9A5"/>
    <circle cx="72" cy="49" r="4" fill="#F1C9A5"/>
    <!-- cheeks -->
    <ellipse cx="40" cy="54" rx="3.5" ry="2.4" fill="#E8896B" opacity="0.28"/>
    <ellipse cx="60" cy="54" rx="3.5" ry="2.4" fill="#E8896B" opacity="0.28"/>
    <path d="M31 50 Q33 70 50 72 Q67 70 69 50 Q64 63 50 63 Q36 63 31 50 Z" fill="#C9A24B" opacity="0.92"/>
    <!-- eyes -->
    <ellipse cx="42.5" cy="46" rx="2.3" ry="3" fill="#2A2018"/>
    <ellipse cx="57.5" cy="46" rx="2.3" ry="3" fill="#2A2018"/>
    <circle cx="43.3" cy="45" r="0.8" fill="#fff" opacity="0.85"/>
    <circle cx="58.3" cy="45" r="0.8" fill="#fff" opacity="0.85"/>
    <!-- brows -->
    <path d="M39 41 Q42.5 39 46 41" stroke="#C9A24B" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M54 41 Q57.5 39 61 41" stroke="#C9A24B" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M50 47 L48 53 Q50 55 52 53" stroke="#E0B58C" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- mouth -->
    <path d="M44 58 Q50 63 56 58" stroke="#9A4A38" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- hair on top -->
    <circle cx="34" cy="34" r="9" fill="#C9A24B"/><circle cx="44" cy="27" r="9" fill="#C9A24B"/><circle cx="56" cy="27" r="9" fill="#C9A24B"/><circle cx="66" cy="34" r="9" fill="#C9A24B"/><circle cx="37" cy="41" r="9" fill="#C9A24B"/><circle cx="63" cy="41" r="9" fill="#C9A24B"/><circle cx="50" cy="25" r="9" fill="#C9A24B"/>
  </g>
</svg>
